<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointments | CarePulse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .timeline {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .appointment-card {
            background: var(--surface-color);
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid;
        }

        .appointment-card.status-Scheduled {
            border-left-color: var(--primary-color);
        }

        .appointment-card.status-Completed {
            border-left-color: var(--success-color);
        }

        .appointment-card.status-Cancelled {
            border-left-color: var(--danger-color);
        }

        .time-col {
            min-width: 100px;
            text-align: center;
            border-right: 1px solid var(--border-color);
            padding-right: 1.5rem;
            margin-right: 1.5rem;
        }

        .time-col .time {
            font-size: 1.2rem;
            font-weight: 700;
        }

        .time-col .date {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .details-col {
            flex: 1;
        }

        .details-col h3 {
            font-size: 1.1rem;
            margin-bottom: 0.3rem;
        }

        .details-col p {
            color: var(--text-muted);
            font-size: 0.9rem;
            display: flex;
            gap: 1rem;
        }

        .status-badge {
            margin-left: auto;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-heart-pulse"></i>
                <span>CarePulse</span>
            </div>
            <nav class="nav-menu">
                <a href="/" class="nav-item"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
                <a href="/patients.html" class="nav-item"><i class="fa-solid fa-user-injured"></i> Patients</a>
                <a href="/doctors.html" class="nav-item"><i class="fa-solid fa-user-doctor"></i> Doctors</a>
                <a href="/appointments.html" class="nav-item active"><i class="fa-solid fa-calendar-check"></i>
                    Appointments</a>
                <a href="#" class="nav-item"><i class="fa-solid fa-gear"></i> Settings</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="search-bar">
                    <i class="fa-solid fa-search"></i>
                    <input type="text" placeholder="Search appointments...">
                </div>
                <div class="user-profile">
                    <div class="notif"><i class="fa-regular fa-bell"></i></div>
                    <img src="https://ui-avatars.com/api/?name=Admin+User&background=0D8ABC&color=fff" alt="Profile">
                </div>
            </header>

            <div class="content-area">
                <div class="page-header">
                    <h1>Schedule</h1>
                    <button class="btn-primary" id="bookBtn"><i class="fa-solid fa-calendar-plus"></i> Book
                        Appointment</button>
                </div>

                <div class="timeline" id="appointmentsList">
                    <!-- Events -->
                </div>
            </div>
        </main>
    </div>

    <!-- Booking Modal -->
    <div class="modal-overlay" id="bookModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Book Appointment</h2>
                <button class="close-btn" id="closeModalBtn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <form id="bookForm">
                    <div class="form-group">
                        <label>Patient Name</label>
                        <input type="text" id="aPatient" required placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label>Doctor</label>
                        <select id="aDoctor">
                            <option value="Dr. Mani Balan">Dr. Mani Balan (Oncology)</option>
                            <option value="Dr. Haleem">Dr. Haleem (Cardio)</option>
							<option value="Dr. Rahul">Dr. Rahul (Neuro)</option>
							<option value="Dr. Srikanth">Dr. Srikanth (Ortho)</option>
							<option value="Dr. Vignesh">Dr. Vignesh (Paediatrics)</option>
							<option value="Dr. Vikram">Dr. Vikram (Anaesthesia)</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Date</label>
                            <input type="date" id="aDate" required>
                        </div>
                        <div class="form-group">
                            <label>Time</label>
                            <input type="time" id="aTime" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Type</label>
                        <select id="aType">
                            <option value="Checkup">Checkup</option>
                            <option value="Surgery">Surgery</option>
                            <option value="Consultation">Consultation</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-submit">Confirm Booking</button>
                </form>
            </div>
        </div>
    </div>

    <script src="js/appointments.js"></script>
</body>

</html>
