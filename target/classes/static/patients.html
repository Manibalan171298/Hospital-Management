<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patients | CarePulse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            border-bottom: 2px solid var(--border-color);
        }

        .tab {
            padding: 0.8rem 1.5rem;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-muted);
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
        }

        .tab.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }
    </style>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-heart-pulse"></i>
                <span>CarePulse</span>
            </div>
            <nav class="nav-menu">
                <a href="/" class="nav-item"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
                <a href="/patients.html" class="nav-item active"><i class="fa-solid fa-user-injured"></i> Patients</a>
                <a href="/doctors.html" class="nav-item"><i class="fa-solid fa-user-doctor"></i> Doctors</a>
                <a href="/appointments.html" class="nav-item"><i class="fa-solid fa-calendar-check"></i>
                    Appointments</a>
                <a href="#" class="nav-item"><i class="fa-solid fa-gear"></i> Settings</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="search-bar">
                    <i class="fa-solid fa-search"></i>
                    <input type="text" placeholder="Search patients...">
                </div>
                <div class="user-profile">
                    <div class="notif"><i class="fa-regular fa-bell"></i></div>
                    <img src="https://ui-avatars.com/api/?name=Admin+User&background=0D8ABC&color=fff" alt="Profile">
                </div>
            </header>

            <div class="content-area">
                <div class="page-header">
                    <h1>Patient Records</h1>
                    <button class="btn-primary" id="addPatientBtn"><i class="fa-solid fa-plus"></i> New Patient</button>
                </div>

                <div class="tabs">
                    <div class="tab active" id="tabActive" onclick="switchTab('active')">Active Patients</div>
                    <div class="tab" id="tabHistory" onclick="switchTab('history')">Archives (Past)</div>
                </div>

                <!-- Patient List -->
                <div class="recent-patients">
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Patient Name</th>
                                    <th>Age/Gender</th>
                                    <th>Condition</th>
                                    <th>Status</th>
                                    <th>Details</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="patientTableBody">
                                <!-- Data will be injected here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add Patient Modal (Reused) -->
    <div class="modal-overlay" id="patientModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Add New Patient</h2>
                <button class="close-btn" id="closeModalBtn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <form id="addPatientForm">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="pName" required placeholder="e.g. John Doe">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Age</label>
                            <input type="number" id="pAge" required placeholder="30">
                        </div>
                        <div class="form-group">
                            <label>Gender</label>
                            <select id="pGender">
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Condition</label>
                        <input type="text" id="pDisease" required placeholder="e.g. Fever">
                    </div>
                    <div class="form-group">
                        <label>Contact</label>
                        <input type="text" id="pContact" placeholder="+1...">
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <select id="pStatus">
                            <option value="Admitted">Admitted</option>
                            <option value="Under Observation">Under Observation</option>
                            <option value="Discharged">Discharged</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-submit">Save Record</button>
                </form>
            </div>
        </div>
    </div>

    <script src="js/patients.js"></script>
</body>

</html>
